name: Deploy to EC2 (dev)

on:
  push:
    branches: ["dev"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nick40599/dinetime:dev
            ghcr.io/nick40599/dinetime:dev-${{ github.sha }}

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_TEST_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_TEST_SSH_KEY }}
          script: |
            set -e
            cd /opt/shopify-app

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose pull

            # Start only db + caddy first
            docker compose up -d db caddy

            # Wait for db readiness
            docker compose exec -T db sh -lc 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done'

            # Run migrations in a one-off container (doesn't require app to be healthy)
            docker compose run --rm app npx prisma migrate deploy

            # Now start the app
            docker compose up -d app

            docker image prune -f
